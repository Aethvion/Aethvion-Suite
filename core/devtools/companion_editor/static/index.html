<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Editor — Aethvion DevTools</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Dashboard base styles -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/companion-creator.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    <link rel="stylesheet" href="/static/css/notifications.css">

    <style>
        /* ── DevTool banner ──────────────────────────────────────────────── */
        :root {
            --devtool-banner-h: 36px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background: var(--bg, #0a0a14);
            color: var(--text, #e2e8f0);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        #devtool-banner {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--devtool-banner-h);
            background: linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            border-bottom: 1px solid rgba(139, 92, 246, 0.4);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
            z-index: 9999;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: rgba(196, 181, 253, 0.9);
            user-select: none;
        }

        #devtool-banner .dt-icon {
            width: 20px; height: 20px;
            background: rgba(139,92,246,0.2);
            border: 1px solid rgba(139,92,246,0.5);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            color: #a78bfa;
        }

        #devtool-banner .dt-label { color: #c4b5fd; }

        #devtool-banner .dt-sep {
            width: 1px; height: 16px;
            background: rgba(139,92,246,0.3);
            margin: 0 4px;
        }

        #devtool-banner .dt-dir {
            font-family: 'Consolas', 'Cascadia Code', monospace;
            font-size: 11px;
            color: rgba(148,163,184,0.7);
            font-weight: 400;
        }

        #devtool-banner .dt-badge {
            margin-left: auto;
            background: rgba(139,92,246,0.15);
            border: 1px solid rgba(139,92,246,0.4);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 10px;
            color: #c4b5fd;
            letter-spacing: 0.08em;
        }

        /* Push content below banner */
        #app-shell {
            position: fixed;
            top: var(--devtool-banner-h);
            left: 0; right: 0; bottom: 0;
            overflow: hidden;
        }

        /* Companion creator needs to fill the shell */
        #companion-creator-root {
            height: 100%;
            overflow: hidden;
        }

        .cc-hub {
            height: 100%;
        }
    </style>
</head>
<body>

<!-- ── DevTool Banner ─────────────────────────────────────────────────────── -->
<div id="devtool-banner">
    <div class="dt-icon"><i class="fas fa-wrench"></i></div>
    <span class="dt-label">Aethvion DevTools</span>
    <div class="dt-sep"></div>
    <i class="fas fa-users" style="color:#a78bfa;font-size:11px;"></i>
    <span>Companion Editor</span>
    <div class="dt-sep"></div>
    <span class="dt-dir">core/companions/configs/</span>
    <span class="dt-badge">DEV TOOL</span>
</div>

<!-- ── App shell ─────────────────────────────────────────────────────────── -->
<div id="app-shell">
    <!--
        companion-creator.js builds its full UI inside #companion-creator-root
        via CompanionCreator.init(). No extra HTML needed.
    -->
    <div id="companion-creator-root"></div>
</div>

<!-- ── Scripts ──────────────────────────────────────────────────────────── -->
<script src="/static/js/companion-creator.js"></script>
<script>
    // companion-creator.js listens for a 'panelLoaded' event with tabName === 'companion-creator'.
    // Fire it once the DOM is ready so CompanionCreator.init() runs exactly as the dashboard does.
    document.addEventListener('DOMContentLoaded', () => {
        document.dispatchEvent(new CustomEvent('panelLoaded', {
            detail: { tabName: 'companion-creator' }
        }));
    });
</script>
</body>
</html>
