<div class="suite-hub">

    <!-- GREETING BAR -->
    <div class="sh-greeting-bar">
        <div class="sh-greeting-left">
            <h1 class="sh-greeting-title" id="sh-greeting-title">Welcome back</h1>
            <div class="sh-greeting-meta">
                <div class="hub-server-status">
                    <span class="hub-status-dot" id="hub-servers-dot"></span>
                    <span id="hub-servers-label">checking status…</span>
                </div>
                <span class="sh-greeting-sep">·</span>
                <span class="sh-greeting-date" id="sh-greeting-date"></span>
            </div>
        </div>
        <div class="sh-greeting-actions">
            <button class="sh-action-btn sh-action-btn--primary"
                    onclick="setDashboardMode('home', true, 'chat');">
                <i class="fas fa-plus"></i>
                <span>New Chat</span>
            </button>
            <button class="sh-action-btn"
                    onclick="setDashboardMode('home', true, 'agents');">
                <i class="fas fa-code"></i>
                <span>New Agent</span>
            </button>
        </div>
    </div>

    <!-- MAIN 2-COLUMN AREA -->
    <div class="sh-main-grid">

        <!-- LEFT: Recent Conversations -->
        <div class="sh-panel sh-panel--threads">
            <div class="sh-panel-header">
                <i class="fas fa-clock-rotate-left"></i>
                <span>Recent Conversations</span>
                <button class="sh-panel-link" onclick="setDashboardMode('home', true, 'chat');">
                    View all <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <div class="sh-recent-list" id="sh-recent-list">
                <div class="ae-loading" style="min-height:160px;">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <span>Loading conversations…</span>
                </div>
            </div>
        </div>

        <!-- RIGHT: Stats sidebar -->
        <div class="sh-sidebar-stack">

            <!-- Today at a glance -->
            <div class="sh-panel sh-panel--stats">
                <div class="sh-panel-header">
                    <i class="fas fa-chart-simple"></i>
                    <span>Today</span>
                </div>
                <div class="sh-stat-list">
                    <div class="sh-stat-row">
                        <span class="sh-stat-label"><i class="fas fa-bolt"></i> Tokens</span>
                        <strong class="sh-stat-val" id="snap-tokens-val">0</strong>
                    </div>
                    <div class="sh-stat-row">
                        <span class="sh-stat-label"><i class="fas fa-dollar-sign"></i> Cost</span>
                        <strong class="sh-stat-val" id="snap-cost-val">$0.00</strong>
                    </div>
                    <div class="sh-stat-row">
                        <span class="sh-stat-label"><i class="fas fa-server"></i> Servers</span>
                        <strong class="sh-stat-val" id="snap-servers-val">—</strong>
                    </div>
                    <div class="sh-stat-row">
                        <span class="sh-stat-label"><i class="fas fa-code-branch"></i> Build</span>
                        <strong class="sh-stat-val" id="snap-version-val">—</strong>
                    </div>
                </div>
            </div>

            <!-- System snapshot mini -->
            <div class="sh-panel sh-panel--modules">
                <div class="sh-panel-header">
                    <i class="fas fa-table-columns"></i>
                    <span>Modules</span>
                </div>
                <div class="sh-stat-list">
                    <div class="sh-stat-row">
                        <span class="sh-stat-label"><i class="fas fa-puzzle-piece"></i> Active</span>
                        <strong class="sh-stat-val" id="snap-tabs-val">—</strong>
                    </div>
                    <div class="sh-stat-row">
                        <span class="sh-stat-label"><i class="fas fa-folder-open"></i> Data folders</span>
                        <strong class="sh-stat-val" id="snap-folders-val">—</strong>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- QUICK LAUNCH -->
    <div class="sh-launch-section">
        <div class="sh-panel-header sh-launch-header">
            <i class="fas fa-bolt"></i>
            <span>Quick Launch</span>
        </div>
        <div class="sh-launch-grid">

            <!-- Row: Primary features -->
            <button class="sh-tile sh-tile--chat"        onclick="setDashboardMode('home', true, 'chat');">
                <i class="fas fa-comments"></i><span>Chat</span>
            </button>
            <button class="sh-tile sh-tile--agents"      onclick="setDashboardMode('home', true, 'agents');">
                <i class="fas fa-code"></i><span>Agents</span>
            </button>
            <button class="sh-tile sh-tile--companions"  onclick="setDashboardMode('home', true, 'companion-creator');">
                <i class="fas fa-users"></i><span>Companions</span>
            </button>
            <button class="sh-tile sh-tile--db"          onclick="setDashboardMode('home', true, 'aethviondb');">
                <i class="fas fa-circle-nodes"></i><span>AethvionDB</span>
            </button>
            <button class="sh-tile sh-tile--automate"    onclick="setDashboardMode('home', true, 'automate');">
                <i class="fas fa-bolt"></i><span>Automate</span>
            </button>
            <button class="sh-tile sh-tile--schedule"    onclick="switchMainTab('schedule');">
                <i class="fas fa-calendar-alt"></i><span>Schedule</span>
            </button>

            <!-- Row: Creative & Research -->
            <button class="sh-tile sh-tile--photo"       onclick="switchMainTab('photo');">
                <i class="fas fa-image"></i><span>Photo</span>
            </button>
            <button class="sh-tile sh-tile--audio"       onclick="switchMainTab('audio');">
                <i class="fas fa-microphone"></i><span>Audio</span>
            </button>
            <button class="sh-tile sh-tile--research"    onclick="switchMainTab('researchboard');">
                <i class="fas fa-balance-scale"></i><span>Directors</span>
            </button>
            <button class="sh-tile sh-tile--arena"       onclick="switchMainTab('arena');">
                <i class="fas fa-shield-halved"></i><span>Arena</span>
            </button>
            <button class="sh-tile sh-tile--memory"      onclick="switchMainTab('memory');">
                <i class="fas fa-brain"></i><span>Memory</span>
            </button>
            <button class="sh-tile sh-tile--files"       onclick="switchMainTab('files');">
                <i class="fas fa-folder-open"></i><span>Files</span>
            </button>

        </div>
    </div>

    <!-- Hidden legacy IDs needed by suite-home.js -->
    <span id="suite-hero-version" style="display:none;">—</span>

</div>
