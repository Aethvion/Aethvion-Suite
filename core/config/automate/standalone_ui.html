<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>%%NAME%%</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
header{background:#1e293b;border-bottom:1px solid #334155;padding:.65rem 1.25rem;display:flex;align-items:center;gap:.75rem}
header h1{font-size:.92rem;font-weight:700;letter-spacing:.02em;flex:1}
.badge{background:#22d3ee1a;color:#22d3ee;border:1px solid #22d3ee44;border-radius:4px;font-size:.65rem;padding:.1rem .38rem;font-weight:700;letter-spacing:.06em;white-space:nowrap}
.pub-badge{background:#a78bfa1a;color:#a78bfa;border:1px solid #a78bfa44;border-radius:4px;font-size:.65rem;padding:.1rem .38rem;font-weight:700;letter-spacing:.06em;white-space:nowrap}
.main{display:flex;flex:1;overflow:hidden}
/* Sidebar */
.sidebar{width:280px;flex-shrink:0;background:#1e293b;border-right:1px solid #334155;overflow-y:auto;display:flex;flex-direction:column}
.sb-section{padding:.8rem 1rem;display:flex;flex-direction:column;gap:.5rem}
.sb-section+.sb-section{border-top:1px solid #1e293b}
.sb-sep{height:1px;background:#334155;margin:0 1rem}
.sb-hdr{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;padding:.6rem 1rem .2rem;display:flex;align-items:center;gap:.4rem}
.field{display:flex;flex-direction:column;gap:.22rem}
.field label{font-size:.76rem;color:#94a3b8;font-weight:500;display:flex;align-items:center;gap:.35rem}
.field .desc{font-size:.68rem;color:#475569;margin-top:.05rem}
.field input,.field textarea,.field select{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:.38rem .5rem;font-size:.8rem;outline:none;resize:vertical;width:100%}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#22d3ee}
.field input[type=checkbox]{width:auto;accent-color:#22d3ee}
.run-section{padding:.5rem 1rem .8rem;display:flex;flex-direction:column;gap:.5rem}
.trig-sel-wrap{display:flex;flex-direction:column;gap:.22rem}
.trig-sel-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569}
.trig-sel{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:.35rem .5rem;font-size:.78rem;outline:none;width:100%}
.trig-sel:focus{border-color:#22d3ee}
.run-btn{background:#22d3ee;color:#0f172a;border:none;border-radius:6px;padding:.55rem 1rem;font-size:.86rem;font-weight:700;cursor:pointer;transition:background .15s;width:100%}
.run-btn:hover{background:#67e8f9}
.run-btn:disabled{opacity:.4;cursor:not-allowed}
/* Content pane */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tab-bar{display:flex;border-bottom:1px solid #334155;background:#1e293b;flex-shrink:0}
.tab-btn{background:none;border:none;color:#64748b;font-size:.78rem;font-weight:600;padding:.55rem .9rem;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s}
.tab-btn.active{color:#e2e8f0;border-bottom-color:#22d3ee}
.tab-pane{display:none;flex:1;overflow:hidden}
.tab-pane.active{display:flex;flex-direction:column}
/* Run pane */
.run-pane{flex:1;display:flex;flex-direction:column;padding:.8rem;gap:.7rem;overflow:hidden}
.outputs-area{display:flex;flex-direction:column;gap:.35rem}
.outputs-hdr{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569}
.output-item{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:.42rem .65rem}
.output-label{font-size:.68rem;color:#475569;font-weight:600;margin-bottom:.18rem}
.output-val{font-size:.8rem;color:#e2e8f0;white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto}
.log-area{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;overflow-y:auto;padding:.65rem;font-family:monospace;font-size:.76rem;min-height:80px}
.log-line{padding:.06rem 0;line-height:1.45}
.log-line.info{color:#64748b}
.log-line.warning{color:#fbbf24}
.log-line.error{color:#f87171}
/* API pane */
.api-pane{flex:1;overflow-y:auto;padding:.9rem 1rem;display:flex;flex-direction:column;gap:1rem}
.api-section-hdr{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:.4rem}
.api-var-table{width:100%;border-collapse:collapse;font-size:.78rem}
.api-var-table th{text-align:left;color:#475569;font-size:.68rem;font-weight:600;padding:.28rem .5rem;border-bottom:1px solid #334155}
.api-var-table td{padding:.3rem .5rem;color:#e2e8f0;border-bottom:1px solid #1e293b;vertical-align:top}
.api-var-table td.type{color:#a78bfa;font-family:monospace;font-size:.74rem}
.api-var-table td.name{font-family:monospace;color:#22d3ee}
.api-var-table td.desc{color:#64748b;font-size:.74rem}
.endpoint-card{background:#1e293b;border:1px solid #334155;border-radius:8px;overflow:hidden}
.ep-hdr{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;cursor:pointer;user-select:none}
.ep-method{font-family:monospace;font-size:.7rem;font-weight:700;padding:.1rem .32rem;border-radius:3px;flex-shrink:0}
.ep-method.GET{background:#22d3ee22;color:#22d3ee}
.ep-method.POST{background:#4ade8022;color:#4ade80}
.ep-path{font-family:monospace;font-size:.8rem;color:#e2e8f0;flex:1}
.ep-desc{font-size:.72rem;color:#64748b}
.ep-body{padding:.5rem .75rem;border-top:1px solid #334155;display:none}
.ep-body.open{display:block}
.ep-body pre{font-size:.72rem;color:#94a3b8;white-space:pre-wrap;word-break:break-word;margin:0}
.copy-btn{background:#334155;border:none;color:#94a3b8;font-size:.68rem;padding:.18rem .4rem;border-radius:4px;cursor:pointer;float:right;margin-left:.5rem}
.copy-btn:hover{background:#475569;color:#e2e8f0}
/* Status bar */
.status-bar{background:#1e293b;border-top:1px solid #334155;padding:.3rem 1rem;font-size:.7rem;color:#475569;display:flex;gap:.5rem;align-items:center;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:#334155;display:inline-block;flex-shrink:0}
.dot.running{background:#22d3ee;animation:pulse 1s infinite}
.dot.ok{background:#4ade80}
.dot.error{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.no-vars{color:#475569;font-size:.8rem;font-style:italic;padding:.2rem 0}
</style>
</head>
<body>
<header>
  <div class="badge">STANDALONE</div>
  <h1>%%NAME%%</h1>
  <span id="pub-var-count" style="display:none" class="pub-badge"></span>
</header>
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Public Variables section -->
    <div class="sb-hdr" id="vars-hdr" style="display:none">
      <i>&#x24;</i> Variables
    </div>
    <div class="sb-section" id="vars-section" style="display:none"></div>
    <div class="sb-sep" id="vars-sep" style="display:none"></div>
    <!-- Input nodes section -->
    <div class="sb-hdr" id="inp-hdr" style="display:none">&#9776; Input Nodes</div>
    <div class="sb-section" id="inp-section" style="display:none"></div>
    <!-- Trigger selector + Run button -->
    <div class="run-section">
      <div class="trig-sel-wrap" id="trig-sel-wrap" style="display:none">
        <span class="trig-sel-label">&#9889; Trigger</span>
        <select class="trig-sel" id="trig-sel"></select>
      </div>
      <button class="run-btn" id="run-btn" onclick="run()">&#9654; Run</button>
    </div>
  </div>
  <!-- Content -->
  <div class="content">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showTab('run')">&#9654; Run</button>
      <button class="tab-btn" onclick="showTab('api')">&#x2756; API</button>
    </div>
    <div class="tab-pane active" id="pane-run">
      <div class="run-pane">
        <div class="outputs-area" id="out-area" style="display:none">
          <div class="outputs-hdr">Outputs</div>
          <div id="out-items"></div>
        </div>
        <div class="log-area" id="log"></div>
      </div>
    </div>
    <div class="tab-pane" id="pane-api">
      <div class="api-pane" id="api-pane"></div>
    </div>
  </div>
</div>
<div class="status-bar">
  <span class="dot" id="dot"></span>
  <span id="status">Ready — configure variables and click Run</span>
</div>
<script>
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['run','api'][i]===id));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
}

// ── Sidebar: public variables ─────────────────────────────────────────────────
async function loadVars(){
  const r=await fetch('/api/variables');
  const vars=await r.json();
  const sec=document.getElementById('vars-section');
  const hdr=document.getElementById('vars-hdr');
  const sep=document.getElementById('vars-sep');
  const cnt=document.getElementById('pub-var-count');
  if(vars.length){
    hdr.style.display='';sep.style.display='';sec.style.display='';
    cnt.style.display='';cnt.textContent=vars.length+' public var'+(vars.length>1?'s':'');
  }
  vars.forEach(v=>{
    const d=document.createElement('div');d.className='field';
    const lb=document.createElement('label');
    lb.innerHTML='<span class="pub-badge" style="font-size:.6rem;padding:.05rem .3rem">PUBLIC</span> '+esc(v.name);
    d.appendChild(lb);
    if(v.description){const ds=document.createElement('div');ds.className='desc';ds.textContent=v.description;d.appendChild(ds);}
    let el;
    if(v.varType==='boolean'){
      el=document.createElement('select');
      el.innerHTML='<option value="true">true</option><option value="false">false</option>';
      el.value=String(v.default).toLowerCase()==='false'?'false':'true';
    } else if(v.varType==='number'){
      el=document.createElement('input');el.type='number';el.value=v.default??0;
    } else {
      el=document.createElement('input');el.type='text';el.value=v.default??'';
    }
    el.dataset.varname=v.name;el.id='v_'+v.name;d.appendChild(el);sec.appendChild(d);
  });
}

// ── Sidebar: named triggers ───────────────────────────────────────────────────
var _TRIGGERS = [];
async function loadTriggers(){
  const r=await fetch('/api/schema');const s=await r.json();
  const trigs=(s.triggers||[]);
  _TRIGGERS = trigs;
  const wrap=document.getElementById('trig-sel-wrap');
  const sel=document.getElementById('trig-sel');
  if(trigs.length<=1){return;}  // only show selector when there are 2+ triggers
  wrap.style.display='';
  const all=document.createElement('option');all.value='';all.textContent='All triggers';sel.appendChild(all);
  trigs.forEach(t=>{
    const o=document.createElement('option');o.value=t.slug;o.textContent=t.name;sel.appendChild(o);
  });
}

// ── Sidebar: input.* nodes ────────────────────────────────────────────────────
async function loadInputs(){
  const r=await fetch('/inputs');const ins=await r.json();
  if(!ins.length)return;
  const sec=document.getElementById('inp-section');
  document.getElementById('inp-hdr').style.display='';
  sec.style.display='';
  ins.forEach(inp=>{
    const d=document.createElement('div');d.className='field';
    const lb=document.createElement('label');lb.textContent=inp.label||inp.id;
    d.appendChild(lb);
    let el;
    if(inp.type==='number'){el=document.createElement('input');el.type='number';el.value=inp.default??0;}
    else if(inp.multiline||inp.type==='list'){el=document.createElement('textarea');el.rows=3;el.value=inp.default??'';}
    else{el=document.createElement('input');el.type='text';el.value=inp.default??'';}
    el.id='i_'+inp.id;el.dataset.nid=inp.id;d.appendChild(el);sec.appendChild(d);
  });
}

// ── Run ───────────────────────────────────────────────────────────────────────
async function run(){
  const btn=document.getElementById('run-btn');
  const log=document.getElementById('log');
  const dot=document.getElementById('dot');
  const status=document.getElementById('status');
  const outArea=document.getElementById('out-area');
  const outItems=document.getElementById('out-items');
  btn.disabled=true;log.innerHTML='';outArea.style.display='none';outItems.innerHTML='';
  dot.className='dot running';status.textContent='Running…';
  // Collect public-variable values
  const vars={};
  document.querySelectorAll('[data-varname]').forEach(e=>vars[e.dataset.varname]=e.value);
  // Collect input-node overrides
  const ov={};
  document.querySelectorAll('[data-nid]').forEach(e=>ov[e.dataset.nid]=e.value);
  // Use named trigger endpoint if one is selected
  const trigSel=document.getElementById('trig-sel');
  const trigSlug=trigSel?trigSel.value:'';
  const params=new URLSearchParams({
    variables:JSON.stringify(vars),
    overrides:JSON.stringify(ov)
  });
  const es=new EventSource((trigSlug?'/stream/'+trigSlug:'/stream')+'?'+params.toString());
  es.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.done){
      es.close();btn.disabled=false;
      dot.className='dot '+(d.ok?'ok':'error');
      status.textContent=d.ok?'Completed ✓':'Completed with errors ✗';
      loadOutputs();return;
    }
    const l=document.createElement('div');l.className='log-line '+(d.level||'info');
    l.textContent='['+(d.ts||'')+'] '+d.msg;log.appendChild(l);log.scrollTop=log.scrollHeight;
  };
  es.onerror=()=>{es.close();btn.disabled=false;dot.className='dot error';status.textContent='Connection error';};
}

async function loadOutputs(){
  const r=await fetch('/outputs');const outs=await r.json();
  if(!outs.length)return;
  const outArea=document.getElementById('out-area');
  const outItems=document.getElementById('out-items');
  outArea.style.display='';outItems.innerHTML='';
  outs.forEach(o=>{
    const item=document.createElement('div');item.className='output-item';
    item.innerHTML='<div class="output-label">'+esc(o.label)+'</div><div class="output-val">'+esc(o.value)+'</div>';
    outItems.appendChild(item);
  });
}

// ── API docs pane ─────────────────────────────────────────────────────────────
async function loadApiDocs(){
  const r=await fetch('/api/schema');
  const s=await r.json();
  const pane=document.getElementById('api-pane');
  // Variables table
  if(s.public_variables&&s.public_variables.length){
    const sec=document.createElement('div');
    sec.innerHTML='<div class="api-section-hdr">Public Variables</div>';
    const tbl=document.createElement('table');tbl.className='api-var-table';
    tbl.innerHTML='<thead><tr><th>Name</th><th>Type</th><th>Default</th><th>Description</th></tr></thead>';
    const tb=document.createElement('tbody');
    s.public_variables.forEach(v=>{
      const tr=document.createElement('tr');
      tr.innerHTML='<td class="name">$'+esc(v.name)+'</td><td class="type">'+esc(v.varType)+'</td><td>'+esc(v.default)+'</td><td class="desc">'+esc(v.description)+'</td>';
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);sec.appendChild(tbl);pane.appendChild(sec);
  }
  // Endpoint cards
  const epsHdr=document.createElement('div');epsHdr.innerHTML='<div class="api-section-hdr">Endpoints</div>';pane.appendChild(epsHdr);
  s.endpoints.forEach(ep=>{
    const card=document.createElement('div');card.className='endpoint-card';
    const hdr=document.createElement('div');hdr.className='ep-hdr';
    const hasBody=ep.body||ep.query_params||ep.response||ep.events;
    hdr.innerHTML='<span class="ep-method '+ep.method+'">'+ep.method+'</span>'
      +'<span class="ep-path">'+esc(ep.path)+'</span>'
      +'<span class="ep-desc">'+esc(ep.description)+'</span>';
    if(hasBody){hdr.innerHTML+='<span style="color:#475569;font-size:.8rem;margin-left:.4rem">&#9660;</span>';}
    card.appendChild(hdr);
    if(hasBody){
      const body=document.createElement('div');body.className='ep-body';
      let content='';
      if(ep.body){content+='// Request body (JSON)\\n'+JSON.stringify(ep.body,null,2)+'\\n';}
      if(ep.query_params){content+='// Query params\\n'+JSON.stringify(ep.query_params,null,2)+'\\n';}
      if(ep.response){content+='// Response\\n'+JSON.stringify(ep.response,null,2)+'\\n';}
      if(ep.events){content+='// SSE events\\n'+JSON.stringify(ep.events,null,2)+'\\n';}
      const pre=document.createElement('pre');pre.textContent=content.trim();
      const copyBtn=document.createElement('button');copyBtn.className='copy-btn';copyBtn.textContent='Copy';
      copyBtn.onclick=(e)=>{e.stopPropagation();navigator.clipboard.writeText(content.trim()).then(()=>{copyBtn.textContent='Copied!';setTimeout(()=>copyBtn.textContent='Copy',1500);});};
      body.appendChild(copyBtn);body.appendChild(pre);card.appendChild(body);
      hdr.style.cursor='pointer';
      hdr.addEventListener('click',()=>body.classList.toggle('open'));
    }
    pane.appendChild(card);
  });
}

// ── Custom Dashboard Layout Renderer ──────────────────────────────────────────
const _WORKFLOW = %%WORKFLOW_JSON%%;

function initDashboard() {
  const uiNodes = (_WORKFLOW.nodes || []).filter(n => n.type.startsWith('ui.'));
  if (uiNodes.length === 0) return;

  // Load marked dynamically if not already present
  if (typeof marked === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    document.head.appendChild(script);
  }

  // Hide generic elements
  document.querySelector('.sidebar').style.display = 'none';
  document.querySelector('.tab-bar').style.display = 'none';

  const paneRun = document.getElementById('pane-run');
  paneRun.innerHTML = '';
  paneRun.style.padding = '1.5rem';
  paneRun.style.overflowY = 'auto';

  const container = document.createElement('div');
  container.style.maxWidth = '1200px';
  container.style.margin = '0 auto';
  container.style.display = 'grid';
  container.style.gridTemplateColumns = 'repeat(12, 1fr)';
  container.style.gap = '1.5rem';
  paneRun.appendChild(container);

  // Separate plates and widget nodes
  const plates = uiNodes.filter(n => n.type === 'ui.plate');
  const widgets = uiNodes.filter(n => n.type !== 'ui.plate');

  // Group widgets by plate_id
  const groups = {};
  const unparented = [];

  widgets.forEach(n => {
    const props = n.properties || {};
    const plateId = props.plate_id;
    if (plateId && plates.some(p => p.id === plateId)) {
      if (!groups[plateId]) groups[plateId] = [];
      groups[plateId].push(n);
    } else {
      unparented.push(n);
    }
  });

  // Sort plates by ui_order
  plates.sort((a, b) => {
    const oA = parseFloat((a.properties || {}).ui_order) || 0;
    const oB = parseFloat((b.properties || {}).ui_order) || 0;
    return oA - oB;
  });

  // Render cards for each plate
  plates.forEach(p => {
    const props = p.properties || {};
    const cardWidgets = groups[p.id] || [];

    cardWidgets.sort((a, b) => {
      const oA = parseFloat((a.properties || {}).ui_order) || 0;
      const oB = parseFloat((b.properties || {}).ui_order) || 0;
      return oA - oB;
    });

    renderCardContainer(props, p.id, cardWidgets, container);
  });

  // Render unparented widgets in a default card
  if (unparented.length > 0) {
    unparented.sort((a, b) => {
      const oA = parseFloat((a.properties || {}).ui_order) || 0;
      const oB = parseFloat((b.properties || {}).ui_order) || 0;
      return oA - oB;
    });
    renderCardContainer({
      label: 'General',
      ui_width: '100',
      background: 'Glassmorphism',
      effect: 'Shadow',
      border_style: 'Solid'
    }, 'unparented', unparented, container);
  }
}

function renderCardContainer(props, cardId, cardWidgets, mainContainer) {
  // Background styles mapping
  let bgStyle = 'rgba(30, 41, 59, 0.4)';
  let backdrop = 'blur(12px)';
  let borderStyle = '1px solid rgba(255, 255, 255, 0.08)';
  let headerColor = '#38bdf8';
  
  const bgType = (props.background || 'Glassmorphism');
  if (bgType === 'Dark Slate') {
    bgStyle = 'rgba(15, 23, 42, 0.95)';
    backdrop = 'none';
    borderStyle = '1px solid rgba(255, 255, 255, 0.05)';
    headerColor = '#94a3b8';
  } else if (bgType === 'Deep Slate') {
    bgStyle = 'rgba(30, 41, 59, 0.95)';
    backdrop = 'none';
    borderStyle = '1px solid rgba(255, 255, 255, 0.1)';
    headerColor = '#38bdf8';
  } else if (bgType === 'Deep Teal') {
    bgStyle = 'rgba(13, 27, 30, 0.9)';
    backdrop = 'blur(8px)';
    borderStyle = '1px solid rgba(4, 120, 87, 0.3)';
    headerColor = '#34d399';
  } else if (bgType === 'Midnight Gradient') {
    bgStyle = 'linear-gradient(135deg, rgba(15,23,42,0.9) 0%, rgba(88,28,135,0.2) 100%)';
    backdrop = 'blur(12px)';
    borderStyle = '1px solid rgba(168,85,247,0.2)';
    headerColor = '#c084fc';
  } else if (bgType === 'Neon Dusk') {
    bgStyle = 'linear-gradient(135deg, rgba(24,24,37,0.95) 0%, rgba(225,29,72,0.15) 100%)';
    backdrop = 'blur(12px)';
    borderStyle = '1px solid rgba(244,63,94,0.3)';
    headerColor = '#fb7185';
  }
  
  // Border type
  const borderType = props.border_style || 'Solid';
  if (borderType === 'Dashed') {
    borderStyle = borderStyle.replace('solid', 'dashed');
  } else if (borderType === 'None') {
    borderStyle = 'none';
  }
  
  // Effects
  let shadowStyle = '0 8px 32px rgba(0, 0, 0, 0.3)';
  const effectType = props.effect || 'Shadow';
  if (effectType === 'Glow') {
    shadowStyle = '0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px rgba(99, 102, 241, 0.15)';
  } else if (effectType === 'None') {
    shadowStyle = 'none';
  }

  // Create card
  const card = document.createElement('div');
  card.className = 'at-ui-card';
  
  const cardWidth = props.ui_width || '100';
  if (cardWidth === '25') {
    card.style.gridColumn = 'span 3';
  } else if (cardWidth === '33') {
    card.style.gridColumn = 'span 4';
  } else if (cardWidth === '50') {
    card.style.gridColumn = 'span 6';
  } else {
    card.style.gridColumn = 'span 12';
  }

  card.style.background = bgStyle;
  card.style.backdropFilter = backdrop;
  card.style.webkitBackdropFilter = backdrop;
  card.style.border = borderStyle;
  card.style.borderRadius = '12px';
  card.style.padding = '1.5rem';
  card.style.boxShadow = shadowStyle;
  card.style.display = 'flex';
  card.style.flexDirection = 'column';
  card.style.gap = '1.25rem';
  
  if (props.custom_css) {
    const styleBlock = document.createElement('style');
    styleBlock.textContent = props.custom_css;
    card.appendChild(styleBlock);
  }

  // Card Header
  const cardHdr = document.createElement('h3');
  cardHdr.style.fontSize = '0.95rem';
  cardHdr.style.fontWeight = '700';
  cardHdr.style.letterSpacing = '0.04em';
  cardHdr.style.textTransform = 'uppercase';
  cardHdr.style.color = headerColor;
  cardHdr.style.borderBottom = '1px solid rgba(255, 255, 255, 0.06)';
  cardHdr.style.paddingBottom = '0.5rem';
  cardHdr.textContent = props.label || 'Dashboard Card';
  card.appendChild(cardHdr);

  const row = document.createElement('div');
  row.style.display = 'flex';
  row.style.flexWrap = 'wrap';
  row.style.gap = '1rem';
  card.appendChild(row);

  cardWidgets.forEach(n => {
    const wProps = n.properties || {};
    const widthPercent = wProps.ui_width || '100';
    const elWrap = document.createElement('div');
    elWrap.style.flex = '1 1 calc(' + widthPercent + '% - 1rem)';
    elWrap.style.minWidth = widthPercent === '100' ? '100%' : '200px';
    elWrap.style.display = 'flex';
    elWrap.style.flexDirection = 'column';
    elWrap.style.gap = '0.35rem';

    const labelText = wProps.label || n.label || '';
    
    if (n.type === 'ui.input_text') {
      const label = document.createElement('label');
      label.style.fontSize = '0.78rem';
      label.style.fontWeight = '500';
      label.style.color = '#94a3b8';
      label.textContent = labelText;
      elWrap.appendChild(label);

      let input;
      if (wProps.multiline) {
        input = document.createElement('textarea');
        input.rows = 4;
        input.style.resize = 'vertical';
      } else {
        input = document.createElement('input');
        input.type = 'text';
      }
      input.id = 'input_' + n.id;
      input.placeholder = wProps.placeholder || 'Type here...';
      input.value = wProps.value || '';
      input.style.background = '#0f172a';
      input.style.border = '1px solid #334155';
      input.style.borderRadius = '6px';
      input.style.color = '#e2e8f0';
      input.style.padding = '0.5rem';
      input.style.fontSize = '0.8rem';
      input.style.outline = 'none';
      input.dataset.uiNid = n.id;
      if (wProps.name) input.dataset.varname = wProps.name;
      elWrap.appendChild(input);

    } else if (n.type === 'ui.input_number') {
      const label = document.createElement('label');
      label.style.fontSize = '0.78rem';
      label.style.fontWeight = '500';
      label.style.color = '#94a3b8';
      label.textContent = labelText;
      elWrap.appendChild(label);

      const input = document.createElement('input');
      input.id = 'input_' + n.id;
      input.type = 'number';
      input.value = wProps.value ?? 0;
      if (wProps.min !== undefined && wProps.min !== '') input.min = wProps.min;
      if (wProps.max !== undefined && wProps.max !== '') input.max = wProps.max;
      if (wProps.step !== undefined) input.step = wProps.step;
      input.style.background = '#0f172a';
      input.style.border = '1px solid #334155';
      input.style.borderRadius = '6px';
      input.style.color = '#e2e8f0';
      input.style.padding = '0.5rem';
      input.style.fontSize = '0.8rem';
      input.style.outline = 'none';
      input.dataset.uiNid = n.id;
      if (wProps.name) input.dataset.varname = wProps.name;
      elWrap.appendChild(input);

    } else if (n.type === 'ui.input_toggle') {
      const label = document.createElement('label');
      label.style.fontSize = '0.78rem';
      label.style.fontWeight = '500';
      label.style.color = '#94a3b8';
      label.style.display = 'flex';
      label.style.alignItems = 'center';
      label.style.gap = '0.5rem';
      label.style.cursor = 'pointer';

      const input = document.createElement('input');
      input.id = 'input_' + n.id;
      input.type = 'checkbox';
      input.checked = !!wProps.value;
      input.style.accentColor = '#06b6d4';
      input.dataset.uiNid = n.id;
      if (wProps.name) input.dataset.varname = wProps.name;

      label.appendChild(input);
      const spanText = document.createElement('span');
      spanText.textContent = labelText;
      label.appendChild(spanText);
      elWrap.appendChild(label);

    } else if (n.type === 'ui.button') {
      const trig = (_TRIGGERS || []).find(t => t.id === n.id);
      const slug = trig ? trig.slug : '';

      const btn = document.createElement('button');
      btn.id = 'btn_' + n.id;
      btn.style.marginTop = '0.5rem';
      btn.style.padding = '0.55rem 1rem';
      btn.style.borderRadius = '6px';
      btn.style.fontSize = '0.85rem';
      btn.style.fontWeight = '700';
      btn.style.cursor = 'pointer';
      btn.style.transition = 'all 0.15s';
      btn.style.display = 'flex';
      btn.style.alignItems = 'center';
      btn.style.justifyContent = 'center';
      btn.style.gap = '0.5rem';
      
      if (wProps.style === 'secondary') {
        btn.style.background = 'transparent';
        btn.style.border = '1px solid #475569';
        btn.style.color = '#e2e8f0';
      } else {
        btn.style.background = '#06b6d4';
        btn.style.border = 'none';
        btn.style.color = '#0f172a';
      }
      btn.innerHTML = `<i class="fas fa-play" style="font-size: 0.75rem;"></i><span>${esc(labelText)}</span>`;
      btn.addEventListener('click', () => {
        runCustomTrigger(n.id, slug, btn);
      });
      elWrap.appendChild(btn);

    } else if (n.type === 'ui.display_text') {
      const label = document.createElement('label');
      label.style.fontSize = '0.78rem';
      label.style.fontWeight = '500';
      label.style.color = '#94a3b8';
      label.textContent = labelText;
      elWrap.appendChild(label);

      const box = document.createElement('div');
      box.dataset.displayNid = n.id;
      box.dataset.markdown = wProps.markdown ? 'true' : 'false';
      box.style.background = '#0f172a';
      box.style.border = '1px solid #334155';
      box.style.borderRadius = '6px';
      box.style.padding = '0.65rem';
      box.style.fontSize = '0.8rem';
      box.style.minHeight = '60px';
      box.style.color = '#cbd5e1';
      box.style.overflowY = 'auto';
      box.style.whiteSpace = 'pre-wrap';
      box.style.wordBreak = 'break-word';
      box.innerHTML = '<span style="color:#475569;font-style:italic;">No output yet</span>';
      elWrap.appendChild(box);

    } else if (n.type === 'ui.display_image') {
      const label = document.createElement('label');
      label.style.fontSize = '0.78rem';
      label.style.fontWeight = '500';
      label.style.color = '#94a3b8';
      label.textContent = labelText;
      elWrap.appendChild(label);

      const box = document.createElement('div');
      box.dataset.displayNid = n.id;
      box.dataset.ratio = wProps.aspect_ratio;
      box.style.background = '#0f172a';
      box.style.border = '1px solid #334155';
      box.style.borderRadius = '6px';
      box.style.padding = '0.5rem';
      box.style.display = 'flex';
      box.style.alignItems = 'center';
      box.style.justifyContent = 'center';
      box.style.overflow = 'hidden';
      box.style.minHeight = '120px';
      box.innerHTML = '<span style="color:#475569;font-style:italic;">No image loaded</span>';
      elWrap.appendChild(box);

    } else if (n.type === 'ui.custom_html') {
      const label = document.createElement('label');
      label.style.fontSize = '0.78rem';
      label.style.fontWeight = '500';
      label.style.color = '#94a3b8';
      label.textContent = labelText;
      elWrap.appendChild(label);

      const box = document.createElement('div');
      box.id = 'disp_' + n.id;
      box.dataset.displayNid = n.id;
      box.style.position = 'relative';

      if (wProps.css) {
        const styleEl = document.createElement('style');
        styleEl.textContent = wProps.css;
        box.appendChild(styleEl);
      }

      const htmlWrapper = document.createElement('div');
      htmlWrapper.innerHTML = wProps.html || '';
      box.appendChild(htmlWrapper);
      elWrap.appendChild(box);

      if (wProps.js) {
        try {
          const helpers = {
            getVariable: (name) => {
              const inputEl = document.getElementById('input_' + name) || document.getElementById('v_' + name);
              if (inputEl) {
                if (inputEl.type === 'checkbox') return inputEl.checked;
                if (inputEl.type === 'number') return parseFloat(inputEl.value) || 0;
                return inputEl.value;
              }
              const node = (_WORKFLOW.nodes || []).find(node => node.id === name || (node.properties && node.properties.name === name));
              if (node) return (node.properties || {}).value || '';
              return undefined;
            },
            setVariable: (name, value) => {
              const inputEl = document.getElementById('input_' + name) || document.getElementById('v_' + name);
              if (inputEl) {
                if (inputEl.type === 'checkbox') {
                  inputEl.checked = !!value;
                } else {
                  inputEl.value = value;
                }
                inputEl.dispatchEvent(new Event('change'));
                inputEl.dispatchEvent(new Event('input'));
              }
            },
            trigger: (btnIdOrLabel) => {
              const btnNode = (_WORKFLOW.nodes || []).find(node => 
                node.type === 'ui.button' && 
                (node.id === btnIdOrLabel || (node.properties && node.properties.label === btnIdOrLabel))
              );
              if (!btnNode) return;
              const btnEl = document.getElementById('btn_' + btnNode.id);
              const trig = (_TRIGGERS || []).find(t => t.id === btnNode.id);
              const slug = trig ? trig.slug : '';
              runCustomTrigger(btnNode.id, slug, btnEl || document.createElement('button'));
            }
          };
          const userFn = new Function('element', 'helpers', wProps.js);
          userFn.call(box, box, helpers);
        } catch (err) {
          console.error('Error running custom JS for node ' + n.id + ':', err);
        }
      }
    }

    row.appendChild(elWrap);
  });

  mainContainer.appendChild(card);
}

async function runCustomTrigger(btnNodeId, slug, btnEl) {
  btnEl.disabled = true;
  const origHtml = btnEl.innerHTML;
  btnEl.style.opacity = '0.6';
  btnEl.innerHTML = `<i class="fas fa-spinner fa-spin" style="font-size: 0.75rem;"></i><span>Running…</span>`;
  
  // Gather variables
  const vars = {};
  document.querySelectorAll('[data-varname]').forEach(e=>{
    if(e.type === 'checkbox') vars[e.dataset.varname] = e.checked;
    else if(e.type === 'number') vars[e.dataset.varname] = parseFloat(e.value) || 0;
    else vars[e.dataset.varname] = e.value;
  });
  document.querySelectorAll('[data-ui-nid]').forEach(e=>{
    let val;
    if(e.type === 'checkbox') val = e.checked;
    else if(e.type === 'number') val = parseFloat(e.value) || 0;
    else val = e.value;
    vars[e.dataset.uiNid] = val;
    if(e.dataset.varname) vars[e.dataset.varname] = val;
  });

  // Clear display output boxes in UI
  document.querySelectorAll('[data-display-nid]').forEach(e=>{
    const customHtmlBox = document.getElementById('disp_' + e.dataset.displayNid);
    const hasCustomHtmlClass = customHtmlBox && (customHtmlBox.querySelector('.at-html-value') || customHtmlBox.querySelector('.at-text-value'));
    if (hasCustomHtmlClass) {
      customHtmlBox.querySelectorAll('.at-html-value').forEach(el => {
        el.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Running…`;
      });
      customHtmlBox.querySelectorAll('.at-text-value').forEach(el => {
        el.textContent = `Running…`;
      });
    } else {
      e.innerHTML = `<div style="display:flex;align-items:center;gap:6px;color:#06b6d4;font-size:0.75rem;"><i class="fas fa-spinner fa-spin"></i> Running…</div>`;
    }
  });

  const params = new URLSearchParams({
    variables: JSON.stringify(vars)
  });
  const es = new EventSource('/stream/' + slug + '?' + params.toString());
  es.onmessage = e => {
    const d = JSON.parse(e.data);
    if(d.done){
      es.close();
      btnEl.disabled = false;
      btnEl.style.opacity = '1';
      btnEl.innerHTML = origHtml;
      document.querySelectorAll('[data-display-nid]').forEach(box=>{
        const customHtmlBox = document.getElementById('disp_' + box.dataset.displayNid);
        const hasCustomHtmlClass = customHtmlBox && (customHtmlBox.querySelector('.at-html-value') || customHtmlBox.querySelector('.at-text-value'));
        if (hasCustomHtmlClass) {
          customHtmlBox.querySelectorAll('.at-html-value').forEach(el => {
            if (el.textContent.includes('Running…')) {
              el.innerHTML = '<span style="color:#475569;font-style:italic;">No output yet</span>';
            }
          });
          customHtmlBox.querySelectorAll('.at-text-value').forEach(el => {
            if (el.textContent.includes('Running…')) {
              el.textContent = 'No output yet';
            }
          });
        } else {
          if(box.textContent.includes('Running…')){
            box.innerHTML = '<span style="color:#475569;font-style:italic;">No output yet</span>';
          }
        }
      });
      const dot=document.getElementById('dot');
      const status=document.getElementById('status');
      dot.className='dot '+(d.ok?'ok':'error');
      status.textContent=d.ok?'Completed ✓':'Completed with errors ✗';
      return;
    }
    if(d.type === 'node_status' && d.status === 'done' && d.outputs){
      if(d.outputs._display !== undefined){
        const box = document.querySelector('[data-display-nid="'+d.node_id+'"]');
        if(box){
          const renderMd = box.dataset.markdown === 'true';
          box.innerHTML = renderMd ? _renderMarkdown(d.outputs._display) : esc(d.outputs._display);
        }
      }
      if(d.outputs._display_image !== undefined){
        const box = document.querySelector('[data-display-nid="'+d.node_id+'"]');
        if(box){
          box.innerHTML = '';
          if(d.outputs._display_image){
            const img = document.createElement('img');
            img.src = d.outputs._display_image;
            img.style.maxWidth = '100%';
            const ratio = box.dataset.ratio;
            if (ratio === '16/9') {
                img.style.aspectRatio = '16/9';
                img.style.objectFit = 'cover';
            } else if (ratio === '1/1') {
                img.style.aspectRatio = '1/1';
                img.style.objectFit = 'cover';
            } else {
                img.style.aspectRatio = 'auto';
            }
            box.appendChild(img);
          } else {
            box.innerHTML = '<span style="color:#475569;font-style:italic;">No image loaded</span>';
          }
        }
      }
      if(d.outputs._display_html !== undefined){
        const box = document.getElementById('disp_' + d.node_id);
        if(box){
          box.querySelectorAll('.at-html-value').forEach(el => {
            el.innerHTML = d.outputs._display_html;
          });
          box.querySelectorAll('.at-text-value').forEach(el => {
            el.textContent = d.outputs._display_html;
          });
          box.dispatchEvent(new CustomEvent('update', { detail: { value: d.outputs._display_html } }));
        }
      }
    }
  };
  es.onerror = () => {
    es.close();
    btnEl.disabled = false;
    btnEl.style.opacity = '1';
    btnEl.innerHTML = origHtml;
    const dot=document.getElementById('dot');
    const status=document.getElementById('status');
    dot.className='dot error';
    status.textContent='Connection error';
  };
}

function _renderMarkdown(text) {
  if (typeof marked !== 'undefined' && marked.parse) {
    try { return marked.parse(text); } catch (_) {}
  }
  return esc(text).replace(/\n/g, '<br>');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
Promise.all([loadVars(),loadInputs(),loadTriggers(),loadApiDocs()]).then(initDashboard);
</script>
